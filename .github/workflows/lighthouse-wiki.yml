name: Lighthouse CI — Wiki Report

on:
  push:
    branches: [main]

permissions:
  contents: write # required to push to the wiki

jobs:
  lighthouse-wiki:
    name: Lighthouse Audit & Wiki Update
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      API_KEY: ci-lighthouse-api-key-32chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @blog/blog build

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          configPath: apps/blog/lighthouserc.json

      - name: Parse Lighthouse scores (average of 3 runs)
        id: scores
        run: |
          avg() { ls .lighthouseci/lhr-*.json | xargs jq "$1" | awk '{s+=$1;c++} END{printf "%.0f",s/c}'; }
          echo "perf=$(avg '.categories.performance.score*100')"           >> $GITHUB_OUTPUT
          echo "a11y=$(avg '.categories.accessibility.score*100')"         >> $GITHUB_OUTPUT
          echo "bp=$(avg '.categories["best-practices"].score*100')"       >> $GITHUB_OUTPUT
          echo "seo=$(avg '.categories.seo.score*100')"                    >> $GITHUB_OUTPUT

      - name: Update GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LHCI_LINKS: ${{ steps.lhci.outputs.links }}
          PERF: ${{ steps.scores.outputs.perf }}
          A11Y: ${{ steps.scores.outputs.a11y }}
          BP: ${{ steps.scores.outputs.bp }}
          SEO: ${{ steps.scores.outputs.seo }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          # Abort gracefully if wiki is not yet enabled
          if ! git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" wiki-repo 2>&1; then
            echo "Wiki not available — skipping update. Enable the wiki for this repository first."
            exit 0
          fi

          python3 - << 'PYEOF'
          import os, json, re
          from datetime import datetime, timezone

          def emoji(score):
              s = int(score)
              return "🟢" if s >= 90 else "🟡" if s >= 50 else "🔴"

          perf  = os.environ["PERF"]
          a11y  = os.environ["A11Y"]
          bp    = os.environ["BP"]
          seo   = os.environ["SEO"]
          sha   = os.environ["COMMIT_SHA"][:7]
          repo  = os.environ["REPO"]
          full_sha = os.environ["COMMIT_SHA"]

          links_raw = os.environ.get("LHCI_LINKS", "{}")
          try:
              links = json.loads(links_raw)
              report_url = next(iter(links.values()), "")
          except Exception:
              report_url = ""

          date_str   = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          commit_url = f"https://github.com/{repo}/commit/{full_sha}"
          report_line = f"\n- **Full report:** [View on LHCI public storage]({report_url})" if report_url else ""

          # Preserve up to 19 previous history rows (total cap: 20)
          wiki_path = "wiki-repo/Lighthouse-Reports.md"
          old_rows = []
          if os.path.exists(wiki_path):
              with open(wiki_path) as f:
                  for line in f:
                      if re.match(r"^\| \d{4}-\d{2}-\d{2}", line):
                          old_rows.append(line.rstrip())
          old_rows = old_rows[:19]

          new_row = (
              f"| {date_str} | [`{sha}`]({commit_url}) "
              f"| {emoji(perf)} {perf} "
              f"| {emoji(a11y)} {a11y} "
              f"| {emoji(bp)} {bp} "
              f"| {emoji(seo)} {seo} |"
          )
          history = "\n".join([new_row] + old_rows)

          page = f"""# Lighthouse Reports

Automatically updated on every push to `main`.

## Latest

| Category | Score |
|---|---|
| Performance | {emoji(perf)} {perf} |
| Accessibility | {emoji(a11y)} {a11y} |
| Best Practices | {emoji(bp)} {bp} |
| SEO | {emoji(seo)} {seo} |

- **Commit:** [`{sha}`]({commit_url})
- **Date:** {date_str}{report_line}

## History

| Date | Commit | Performance | Accessibility | Best Practices | SEO |
|---|---|---|---|---|---|
{history}
"""
          with open(wiki_path, "w") as f:
              f.write(page)

          print(f"Wiki page written: Perf={perf} A11Y={a11y} BP={bp} SEO={seo}")
          PYEOF

          cd wiki-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Lighthouse-Reports.md
          git diff --staged --quiet \
            || git commit -m "lighthouse: ${COMMIT_SHA:0:7} — Perf=${PERF} A11Y=${A11Y} BP=${BP} SEO=${SEO}"
          git push
